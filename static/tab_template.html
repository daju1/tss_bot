<html>
<head>
 <title></title>
</head>
<body>
<style>

 td {
        width: 150px;
        text-align: center;
        border: 1px solid black;
        padding: 5px;
      }
</style>
<table>
  <thead>
    <tr>
        <th>year</th>
        <th>month</th>
        <th>day</th>
        <th>hour</th>
        <th>minute</th>
        <th>second</th>
        <th>name</th>
        <th>message</th>
    </tr>
    </thead>
    <tbody>
     {% for year, month, day, hour, minute, second, first_name, msg in messages %}
            <tr>
                <td>{{year}}</td>
                <td>{{month}}</td>
                <td>{{day}}</td>
                <td>{{hour}}</td>
                <td>{{minute}}</td>
                <td>{{second}}</td>
                <td>{{first_name}}</td>
                <td>{{msg}}</td>
            </tr>
        {% endfor %}
    </tbody>
</table>
</body>
</html>
